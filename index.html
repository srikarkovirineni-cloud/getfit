html,body{height:100%;overflow:hidden;}

.screen{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:90px;}

.sw{flex:1;position:relative;overflow:hidden;}
.tb{display:flex;background:#0f0f1a;border-top:0.5px solid #2a2a3a;padding:8px 0;padding-bottom:max(env(safe-area-inset-bottom),16px);flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 0;}
.tl{font-size:10px;font-weight:500;color:#555;transition:color .2s;}
.tab.active .tl{color:#7c6fff;}
input[type=text],input[type=password],input[type=number]{width:100%;background:#1a1a2a;border:0.5px solid #3a3a5a;border-radius:12px;padding:13px 16px;color:#f0f0f5;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;transition:border .2s;}
input:focus{border-color:#7c6fff;}
textarea{width:100%;background:#1a1a2a;border:0.5px solid #3a3a5a;border-radius:12px;padding:13px 16px;color:#f0f0f5;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;resize:none;-webkit-appearance:none;}
textarea:focus{border-color:#7c6fff;}
.btn{width:100%;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;-webkit-appearance:none;transition:all .2s;}
.btn-p{background:#7c6fff;color:#fff;}
.btn-p:active{background:#9d8fff;transform:scale(.98);}
.btn-g{background:transparent;border:0.5px solid #3a3a4a;color:#888;font-family:'DM Sans',sans-serif;font-size:14px;}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px;width:auto;}
.card{background:#1a1a2a;border-radius:16px;padding:14px 16px;border:0.5px solid #2a2a3a;margin-bottom:10px;}
.sh{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;}
.hid{display:none!important;}
.logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(135deg,#7c6fff,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.err{color:#ff7070;font-size:13px;text-align:center;margin-top:8px;min-height:18px;}
.back{color:#7c6fff;font-size:14px;cursor:pointer;margin-bottom:16px;padding:4px 0;}
.ex-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid #1e1e2e;}
.ex-row:last-child{border-bottom:none;}
.ex-num{width:22px;height:22px;border-radius:50%;background:#7c6fff22;color:#a88fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.spinner{width:32px;height:32px;border:3px solid #2a2a3a;border-top-color:#7c6fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:#7c6fff;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.heat-cell{width:12px;height:12px;border-radius:2px;}

// ── UTILS ─────────────────────────────────────────────────────────────────────
const g = id => document.getElementById(id);
const uid = () => Math.random().toString(36).slice(2);
async function sha(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function clk(){const n=new Date();g('clk').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
setInterval(clk,30000);clk();
function toast(msg,dur=2500){const t=g('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function ini(n){return(n||'??').slice(0,2).toUpperCase();}
function dk(d){return new Date(d).toISOString().slice(0,10);}
function pts(w){return(w||[]).reduce((s,x)=>{const t=TYPES.find(y=>y.id===x.type)||{pts:2};return s+t.pts*(x.intensity||2);},0);}
function streak(workouts){
  const days=[...new Set((workouts||[]).map(w=>dk(w.logged_at)))].sort().reverse();
  if(!days.length)return 0;
  let s=0,cur=new Date();cur.setHours(0,0,0,0);
  for(const d of days){const dd=new Date(d);dd.setHours(0,0,0,0);const diff=Math.round((cur-dd)/86400000);if(diff===0||diff===1){s++;cur=dd;}else break;}
  return s;
}
function weekWorkouts(workouts){
  const mon=new Date();mon.setHours(0,0,0,0);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  return(workouts||[]).filter(w=>new Date(w.logged_at)>=mon);
}
function fmt(secs){const m=Math.floor(secs/60),s=secs%60;return m+':'+(s<10?'0':'')+s;}

function nav(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hid'));
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');t.querySelector('.tl').style.color='#555';});
  g('s-'+tab).classList.remove('hid');

  if(tab==='me')renderMe();
}

function renderAuth(mode='login'){
  const v=g('s-auth');v.innerHTML='';
  v.insertAdjacentHTML('beforeend','<div style="text-align:center;margin-bottom:40px"><div class="logo">Get Fit</div><div style="color:#666;font-size:14px;margin-top:6px">Squad edition</div></div>');

    const er=mk('div',{class:'err'});
    const lb=mk('button',{class:'btn btn-p',style:'margin-top:16px'},['Sign in']);
    lb.onclick=async()=>{
      const u=ui.value.trim(),p=pi.value;
      if(!u||!p){er.textContent='Enter username and password';return;}
      lb.textContent='Signing in...';lb.disabled=true;
      try{
        const h=await sha(p);
        const {data,error}=await sb.from('users').select('*').eq('username',u.toLowerCase()).eq('password_hash',h).single();
        if(error||!data){er.textContent='Wrong username or password';lb.textContent='Sign in';lb.disabled=false;return;}
        CU=data;localStorage.setItem('gf-uid',data.id);
        launch();
      }catch(e){er.textContent='Connection error';lb.textContent='Sign in';lb.disabled=false;}
    };
    v.append(mk('div',{style:'font-family:Syne,sans-serif;font-size:20px;font-weight:700;margin-bottom:24px'},['Welcome back']),ui,pi,er,lb);
    v.append(mk('button',{class:'btn btn-g',style:'margin-top:12px',onclick:()=>renderAuth('reg')},['Create account']));
  } else {
    const ui=mkInput('text','Username',{autocapitalize:'none',style:'margin-bottom:12px'});
    const pi=mkInput('password','Password',{style:'margin-bottom:12px'});
    const p2=mkInput('password','Confirm password');
    const cs={c:'#7c6fff'};
    const cr=mk('div',{style:'display:flex;gap:10px;margin-top:10px;margin-bottom:4px'});
    ['#7c6fff','#ff6b9d','#4ecdc4','#ffa94d','#51cf66','#ff6b6b'].forEach(c=>{

      cr.appendChild(d);
    });
    const er=mk('div',{class:'err'});
    const rb=mk('button',{class:'btn btn-p',style:'margin-top:16px'},['Create account']);
    rb.onclick=async()=>{
      const u=ui.value.trim(),p=pi.value,p2v=p2.value;
      if(!u||u.length<2){er.textContent='At least 2 characters';return;}
      if(p.length<4){er.textContent='Password must be 4+ characters';return;}
      if(p!==p2v){er.textContent='Passwords do not match';return;}
      rb.textContent='Creating...';rb.disabled=true;
      try{

        const color=u.toLowerCase()===ALEJ?'#ff6b9d':cs.c;
        const {data,error}=await sb.from('users').insert({username:u.toLowerCase(),password_hash:h,color,icon:'💪'}).select().single();
        if(error){er.textContent=error.code==='23505'?'Username taken':'Error creating account';rb.textContent='Create account';rb.disabled=false;return;}
        CU=data;localStorage.setItem('gf-uid',data.id);
        launch();
      }catch(e){er.textContent='Connection error';rb.textContent='Create account';rb.disabled=false;}

  }
}

function mkInput(type,ph,attrs={}){
  const el=document.createElement('input');
  el.type=type;el.placeholder=ph;
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style')el.style.cssText=v;
    else el.setAttribute(k,v);
  });
  return el;
}

function mk(tag,props={},children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='onclick')e.onclick=v;
    else if(k==='class')e.className=v;
    else if(k==='style')e.style.cssText=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}

    c3.innerHTML=`<div style="width:32px;height:32px;border-radius:50%;background:${u.color}22;color:${u.color};display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-size:11px;font-weight:700">${ini(u.username)}</div><div style="flex:1;font-size:13px"><span style="font-weight:500">${u.username}</span> · ${t.icon} ${w.program_name||t.label}<div style="font-size:11px;color:#555">${w.duration} min · ${new Date(w.logged_at).toLocaleDateString()}</div></div><div style="font-size:12px;color:#a88fff;font-weight:500">+${t.pts*(w.intensity||2)}</div>`;
    pad.appendChild(c3);
  });

  // Join another squad button
  const joinRow=mk('div',{style:'display:flex;gap:10px;margin-top:16px;margin-bottom:20px'});
  const jb=mk('button',{class:'btn btn-g',style:'flex:1',onclick:()=>showJoinModal(s)},['Join another squad']);
  joinRow.appendChild(jb);
  if(isOwner){
    const lb=mk('button',{style:'background:#ff444418;border:0.5px solid #ff444433;border-radius:14px;padding:14px;color:#ff7070;font-size:13px;cursor:pointer;flex:1',onclick:async()=>{
      if(!confirm('Delete this squad? All members will lose access.'))return;
      await sb.from('squads').delete().eq('id',squad.id);
      window._activeSquadId=null;toast('Squad deleted');renderSquad();
    }},['Delete squad']);
    joinRow.appendChild(lb);
  } else {
    const lb=mk('button',{style:'background:#ff444418;border:0.5px solid #ff444433;border-radius:14px;padding:14px;color:#ff7070;font-size:13px;cursor:pointer;flex:1',onclick:async()=>{
      if(!confirm('Leave this squad?'))return;
      await sb.from('squad_members').delete().eq('squad_id',squad.id).eq('username',CU.username);
      window._activeSquadId=null;toast('Left squad');renderSquad();
    }},['Leave squad']);
    joinRow.appendChild(lb);
  }
  pad.appendChild(joinRow);
  s.appendChild(pad);
}

function showSquadModal(parentScreen){
  const modal=mk('div',{style:'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end'});
  const sheet=mk('div',{style:'background:#1a1a2a;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%'});
  sheet.insertAdjacentHTML('beforeend','<div style="width:40px;height:4px;background:#3a3a4a;border-radius:2px;margin:0 auto 20px"></div>');
  sheet.insertAdjacentHTML('beforeend','<div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;margin-bottom:20px">Create a squad</div>');
  const ni=mkInput('text','Squad name e.g. Gym Rats 💪',{style:'margin-bottom:12px'});
  sheet.appendChild(ni);
  const er=mk('div',{class:'err'});
  const cb=mk('button',{class:'btn btn-p'},['Create squad']);
  cb.onclick=async()=>{
    const name=ni.value.trim();
    if(!name){er.textContent='Enter a squad name';return;}
    cb.textContent='Creating...';cb.disabled=true;
    // Generate 6-char code
    const code=Math.random().toString(36).slice(2,8).toUpperCase();
    const {data:squad,error}=await sb.from('squads').insert({name,code,owner_username:CU.username}).select().single();
    if(error){er.textContent='Error creating squad';cb.textContent='Create squad';cb.disabled=false;return;}
    await sb.from('squad_members').insert({squad_id:squad.id,username:CU.username});
    window._activeSquadId=squad.id;
    modal.remove();
    toast('Squad created! Code: '+code);
    renderSquad();
  };
  sheet.append(er,cb);
  const cancel=mk('button',{class:'btn btn-g',style:'margin-top:10px',onclick:()=>modal.remove()},['Cancel']);
  sheet.appendChild(cancel);
  modal.appendChild(sheet);
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  parentScreen.appendChild(modal);
}

function showJoinModal(parentScreen){
  const modal=mk('div',{style:'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end'});
  const sheet=mk('div',{style:'background:#1a1a2a;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%'});
  sheet.insertAdjacentHTML('beforeend','<div style="width:40px;height:4px;background:#3a3a4a;border-radius:2px;margin:0 auto 20px"></div>');
  sheet.insertAdjacentHTML('beforeend','<div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;margin-bottom:20px">Join a squad</div>');
  sheet.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:12px">Enter the 6-character code your squad owner shared with you</div>');
  const ci=mkInput('text','Squad code e.g. ABC123',{style:'margin-bottom:12px;text-transform:uppercase;letter-spacing:4px;font-size:20px;text-align:center;font-family:Syne,sans-serif'});
  ci.maxLength=6;
  ci.oninput=()=>ci.value=ci.value.toUpperCase();
  sheet.appendChild(ci);
  const er=mk('div',{class:'err'});
  const jb=mk('button',{class:'btn btn-p'},['Join squad']);
  jb.onclick=async()=>{
    const code=ci.value.trim().toUpperCase();
    if(code.length!==6){er.textContent='Enter a 6-character code';return;}
    jb.textContent='Joining...';jb.disabled=true;
    const {data:squad,error}=await sb.from('squads').select('*').eq('code',code).single();
    if(error||!squad){er.textContent='Squad not found — check the code';jb.textContent='Join squad';jb.disabled=false;return;}
    // Check already a member
    const {data:existing}=await sb.from('squad_members').select('*').eq('squad_id',squad.id).eq('username',CU.username).single();
    if(existing){er.textContent="You're already in this squad";jb.textContent='Join squad';jb.disabled=false;return;}
    await sb.from('squad_members').insert({squad_id:squad.id,username:CU.username});
    window._activeSquadId=squad.id;
    modal.remove();
    toast('Joined '+squad.name+'! 🎉');
    renderSquad();
  };
  sheet.append(er,jb);
  const cancel=mk('button',{class:'btn btn-g',style:'margin-top:10px',onclick:()=>modal.remove()},['Cancel']);
  sheet.appendChild(cancel);
  modal.appendChild(sheet);
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  parentScreen.appendChild(modal);
}


// ── LOG ───────────────────────────────────────────────────────────────────────
function renderLog(){
  const s=g('s-log');s.innerHTML='';
  const pad=mk('div',{style:'padding:20px 20px 0'});
  pad.insertAdjacentHTML('beforeend','<div style="font-family:Syne,sans-serif;font-size:22px;font-weight:700;margin-bottom:16px">Log workout</div>');

  // Type grid
  const tcard=mk('div',{class:'card'});
  tcard.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:10px">Type</div>');
  const tg=mk('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:8px'});
  TYPES.forEach(t=>{
    const b=mk('button',{style:`background:${logType===t.id?t.color+'33':'#0f0f1a'};border:0.5px solid ${logType===t.id?t.color:'#2a2a3a'};border-radius:12px;padding:12px 8px;color:${logType===t.id?t.color:'#888'};font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;justify-content:center;`});
    b.innerHTML=`<span style="font-size:16px">${t.icon}</span>${t.label}`;
    b.onclick=()=>{logType=t.id;renderLog();};
    tg.appendChild(b);
  });
  tcard.appendChild(tg);pad.appendChild(tcard);

  // Duration
  const durState={v:45};
  const durLbl=mk('span',{style:'font-family:Syne,sans-serif;font-size:20px;font-weight:700;min-width:48px'},['45']);
  const durSlider=mk('input',{type:'range',min:'5',max:'120',step:'5',style:'flex:1'});
  durSlider.value='45';
  durSlider.oninput=()=>{durState.v=parseInt(durSlider.value);durLbl.textContent=durSlider.value;};
  const dc=mk('div',{class:'card',style:'margin-top:0'});
  dc.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:8px">Duration (min)</div>');
  const dr=mk('div',{style:'display:flex;align-items:center;gap:12px'});dr.append(durSlider,durLbl);dc.appendChild(dr);pad.appendChild(dc);

  // Intensity
  const ic=mk('div',{class:'card',style:'margin-top:0'});
  ic.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:8px">Intensity</div>');
  const ir=mk('div',{style:'display:flex;gap:8px'});
  [[1,'😌 Easy','#51cf66'],[2,'💪 Medium','#ffa94d'],[3,'🔥 Hard','#ff6b6b']].forEach(([v,lbl,col])=>{
    const b=mk('button',{style:`flex:1;background:${col}11;border:0.5px solid ${logInt===v?col:col+'44'};border-radius:10px;padding:10px 4px;color:${col};font-size:12px;cursor:pointer;opacity:${logInt===v?'1':'0.5'};`});
    b.textContent=lbl;b.onclick=()=>{logInt=v;renderLog();};ir.appendChild(b);
  });ic.appendChild(ir);pad.appendChild(ic);

  // Notes
  const nc=mk('div',{class:'card',style:'margin-top:0'});
  nc.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:8px">Notes</div>');
  const nta=mk('textarea',{placeholder:'PR\'d bench press, felt strong...',style:'height:72px'});
  nc.appendChild(nta);pad.appendChild(nc);

  const er=mk('div',{class:'err'});
  const sc=mk('div',{style:'color:#51cf66;font-size:15px;text-align:center;margin-top:14px;font-weight:500;display:none'});
  const lb=mk('button',{class:'btn btn-p'},['+ Log workout']);
  lb.onclick=async()=>{
    if(!logType){er.textContent='Pick a type first';return;}
    lb.textContent='Saving...';lb.disabled=true;
    const t=TYPES.find(x=>x.id===logType);
    const {error}=await sb.from('workouts').insert({user_id:CU.id,username:CU.username,type:logType,duration:durState.v,intensity:logInt,notes:nta.value.trim(),logged_at:new Date().toISOString()});
    if(error){er.textContent='Save failed';lb.textContent='+ Log workout';lb.disabled=false;return;}
    er.textContent='';
    sc.style.display='block';sc.textContent=`Logged! 🎉 +${t.pts*logInt} pts`;
    lb.textContent='+ Log another';lb.disabled=false;logType=null;nta.value='';
    setTimeout(()=>{sc.style.display='none';renderLog();},2500);
  };
  pad.append(lb,er,sc);s.appendChild(pad);
}

// ── PROGRAMS ──────────────────────────────────────────────────────────────────
async function renderProg(){
  const s=g('s-prog');
  if(progView==='list')await renderProgList(s);
  else if(progView==='detail')renderProgDetail(s);
  else if(progView==='builder')renderBuilder(s);
  else if(progView==='active')renderActiveWorkout(s);
}

async function getUserProgs(){
  const {data}=await sb.from('programs').select('*').eq('username',CU.username);
  const custom=(data||[]).map(p=>({...p,days:p.days||[]}));
  if(CU.username===ALEJ)return[...ALEJ_PROGS,...custom];
  return custom;
}

async function renderProgList(s){
  s.innerHTML='<div style="padding:20px"><div class="spinner" style="margin:60px auto"></div></div>';
  const progs=await getUserProgs();
  s.innerHTML='';
  const pad=mk('div',{style:'padding:20px 20px 0'});

  // Header with tabs
  const hdr=mk('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:16px'});
  hdr.innerHTML='<div style="font-family:Syne,sans-serif;font-size:22px;font-weight:700">Programs</div>';
  const nb=mk('button',{class:'btn btn-p btn-sm',onclick:startBuilder},['+ Create']);
  hdr.appendChild(nb);pad.appendChild(hdr);

  // Tab bar: My Programs | Celebrity | Exercise Library
  const progTabState={tab:'mine'};
  const tabBar=mk('div',{style:'display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px'});
  const tabs=[['mine','My Programs'],['celeb','⭐ Templates'],['library','🏋️ Exercise Library']];
  tabs.forEach(([id,lbl])=>{
    const b=mk('button',{style:`background:${progTabState.tab===id?'#7c6fff':'#1a1a2a'};border:0.5px solid ${progTabState.tab===id?'#7c6fff':'#2a2a3a'};border-radius:20px;padding:6px 16px;color:${progTabState.tab===id?'#fff':'#888'};font-size:13px;cursor:pointer;white-space:nowrap;font-weight:${progTabState.tab===id?'600':'400'}`});

    tabBar.appendChild(b);
  });
  pad.appendChild(tabBar);

  const contentDiv=mk('div',{id:'prog-content'});
  pad.appendChild(contentDiv);
  s.appendChild(pad);
  renderProgSection(pad,progTabState,progs);
}

function renderProgSection(pad,state,progs){
  const cd=pad.querySelector('#prog-content')||pad;
  // update tab styles
  const btns=pad.querySelectorAll('button[data-prog-tab]');
  // re-render
  const old=pad.querySelector('#prog-content');
  if(old)old.innerHTML='';
  const cont=old||cd;

  if(state.tab==='mine'){
    if(!progs.length){cont.insertAdjacentHTML('beforeend','<div class="card" style="text-align:center;padding:32px;color:#555">No programs yet.<br>Tap + Create to build one.</div>');}
    progs.forEach(p=>{
    const isBuiltIn=ALEJ_PROGS.find(x=>x.id===p.id);
    const c=mk('div',{class:'card',style:'cursor:pointer;display:flex;align-items:center;gap:12px'});
    c.innerHTML=`<div style="width:46px;height:46px;border-radius:14px;background:${p.color||'#7c6fff'}22;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${p.icon||'💪'}</div><div style="flex:1"><div style="font-family:Syne,sans-serif;font-size:15px;font-weight:700">${p.name}</div><div style="font-size:12px;color:#666;margin-top:2px">${p.description||''} · ${p.days?p.days.length+' days':''}</div></div>`;
    const btns=mk('div',{style:'display:flex;gap:6px;flex-shrink:0'});
    if(!isBuiltIn){
      const eb=mk('button',{style:'background:#2a2a3a;border:none;border-radius:10px;padding:6px 10px;font-size:14px;cursor:pointer'},['✏️']);
      eb.onclick=e=>{e.stopPropagation();startBuilder(p);};
      const db=mk('button',{style:'background:#ff444418;border:0.5px solid #ff444433;border-radius:10px;padding:6px 10px;color:#ff7070;font-size:14px;cursor:pointer'},['🗑']);
      db.onclick=async e=>{e.stopPropagation();if(!confirm('Delete this program?'))return;await sb.from('programs').delete().eq('id',p.id);toast('Program deleted');renderProg();};
      btns.append(eb,db);
    }
    const sb2=mk('button',{style:'background:#7c6fff;border:none;border-radius:10px;padding:6px 12px;color:#fff;font-size:14px;cursor:pointer'},['▶']);
    sb2.onclick=e=>{e.stopPropagation();activeProg=p;activeDay=0;progView='detail';renderProg();};
    btns.appendChild(sb2);c.appendChild(btns);
    c.onclick=()=>{activeProg=p;activeDay=0;progView='detail';renderProg();};
    cont.appendChild(c);
  });

  } else if(state.tab==='celeb'){
    // Group by category
    const categories={};
    CELEB_PROGS.forEach(p=>{
      if(!categories[p.category])categories[p.category]=[];
      categories[p.category].push(p);
    });
    Object.entries(categories).forEach(([cat,progs2])=>{
      cont.insertAdjacentHTML('beforeend',`<div style="font-size:12px;color:#888;font-weight:600;letter-spacing:.5px;margin-bottom:8px;margin-top:8px">${cat.toUpperCase()}</div>`);
      progs2.forEach(p=>{
        const c2=mk('div',{class:'card',style:'cursor:pointer;display:flex;align-items:center;gap:12px'});
        c2.innerHTML=`<div style="width:46px;height:46px;border-radius:14px;background:${p.color}22;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${p.icon}</div><div style="flex:1"><div style="font-family:Syne,sans-serif;font-size:15px;font-weight:700">${p.name}</div><div style="font-size:12px;color:#666;margin-top:2px">${p.desc} · ${p.days.length} days</div></div>`;
        const ab=mk('button',{style:'background:#7c6fff22;border:0.5px solid #7c6fff44;border-radius:10px;padding:6px 12px;color:#a88fff;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0'});
        ab.textContent='Add';
        ab.onclick=async e=>{
          e.stopPropagation();
          const {error}=await sb.from('programs').insert({username:CU.username,user_id:CU.id,name:p.name,icon:p.icon,color:p.color,type:p.type,description:p.desc,days:p.days});
          if(!error){toast(p.name+' added to your programs!');}
        };
        c2.appendChild(ab);
        c2.onclick=()=>{activeProg=p;activeDay=0;progView='detail';renderProg();};
        cont.appendChild(c2);
      });
    });

  } else if(state.tab==='library'){
    // Search bar
    const srch=mk('div',{style:'margin-bottom:16px'});
    const si=mkInput('text','Search exercises...',{style:'margin-bottom:0'});
    srch.appendChild(si);
    cont.appendChild(srch);
    const libCont=mk('div',{id:'lib-cont'});
    cont.appendChild(libCont);
    const renderLib=(filter)=>{
      libCont.innerHTML='';
      Object.entries(EXERCISE_LIB).forEach(([muscle,exes])=>{
        const filtered=filter?exes.filter(e=>e.name.toLowerCase().includes(filter.toLowerCase())):exes;
        if(!filtered.length)return;
        libCont.insertAdjacentHTML('beforeend',`<div style="font-size:12px;color:#888;font-weight:600;letter-spacing:.5px;margin-bottom:8px;margin-top:12px">${muscle.toUpperCase()}</div>`);
        filtered.forEach(ex=>{
          const row=mk('div',{style:'display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #1a1a2a'});
          row.innerHTML=`<div style="flex:1"><div style="font-size:14px;font-weight:500">${ex.name}</div><div style="font-size:12px;color:#666">${ex.sets} sets · ${ex.reps}${ex.rest?' · '+ex.rest+'s rest':''}</div></div>`;
          const ab=mk('button',{style:'background:#7c6fff22;border:0.5px solid #7c6fff44;border-radius:10px;padding:6px 12px;color:#a88fff;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0'});
          ab.textContent='+ Add';
          ab.onclick=()=>{
            toast('Tap + Create, then add "'+ex.name+'" from your plan');
          };
          row.appendChild(ab);
          libCont.appendChild(row);
        });
      });
      if(!libCont.children.length)libCont.insertAdjacentHTML('beforeend','<div style="color:#555;font-size:13px;padding:20px 0">No exercises found</div>');
    };
    si.oninput=()=>renderLib(si.value);
    renderLib('');
  }
}

function renderProgDetail(s){
  const p=activeProg;s.innerHTML='';
  const pad=mk('div',{style:'padding:20px 20px 0'});
  pad.insertAdjacentHTML('beforeend',`<div class="back" onclick="progView='list';renderProg()">← Programs</div>`);
  pad.insertAdjacentHTML('beforeend',`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><div style="width:52px;height:52px;border-radius:16px;background:${p.color||'#7c6fff'}22;display:flex;align-items:center;justify-content:center;font-size:26px">${p.icon||'💪'}</div><div><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700">${p.name}</div><div style="font-size:13px;color:#666">${p.description||''}</div></div></div>`);
  const days=p.days||[];
  if(days.length){
    days.forEach((day,di)=>{
      const card=mk('div',{class:'card'});
      card.insertAdjacentHTML('beforeend',`<div style="font-family:Syne,sans-serif;font-size:14px;font-weight:700;color:${p.color||'#7c6fff'};margin-bottom:10px">${day.day}</div>`);
      (day.exercises||[]).forEach((ex,ei)=>{
        card.insertAdjacentHTML('beforeend',`<div class="ex-row"><div class="ex-num">${ei+1}</div><div style="flex:1"><div style="font-size:14px;font-weight:500">${ex.name}</div><div style="font-size:12px;color:#888;margin-top:2px">${ex.sets} sets × ${ex.reps}${ex.rest?' · '+ex.rest+'s rest':''}${ex.note?' · '+ex.note:''}</div></div></div>`);
      });
      const sb3=mk('button',{class:'btn btn-p',style:`background:${p.color||'#7c6fff'};margin-top:12px;`},['▶ Start day '+(di+1)]);
      sb3.onclick=()=>{activeDay=di;progView='active';renderProg();};
      card.appendChild(sb3);pad.appendChild(card);
    });
  } else {
    const card=mk('div',{class:'card'});
    (p.exercises||[]).forEach((ex,ei)=>{
      card.insertAdjacentHTML('beforeend',`<div class="ex-row"><div class="ex-num">${ei+1}</div><div style="flex:1"><div style="font-size:14px;font-weight:500">${ex.name}</div><div style="font-size:12px;color:#888;margin-top:2px">${ex.sets} sets × ${ex.reps}${ex.rest?' · '+ex.rest+'s rest':''}${ex.note?' · '+ex.note:''}</div></div></div>`);
    });
    const sb4=mk('button',{class:'btn btn-p',style:'margin-top:12px'},['▶ Start workout']);
    sb4.onclick=()=>{activeDay=0;progView='active';renderProg();};
    card.appendChild(sb4);pad.appendChild(card);
  }
  s.appendChild(pad);
}

// ── ACTIVE WORKOUT ────────────────────────────────────────────────────────────
function renderActiveWorkout(s){
  const p=activeProg;
  const day=p.days&&p.days[activeDay];
  const exes=day?day.exercises:(p.exercises||[]);
  const dayLabel=day?day.day:p.name;
  if(!activeWorkout||activeWorkout.progId!==p.id||activeWorkout.dayIdx!==activeDay){
    activeWorkout={progId:p.id,dayIdx:activeDay,exes,sets:exes.map(ex=>Array(typeof ex.sets==='number'?ex.sets:3).fill(null).map(()=>({done:false,weight:''})))};
    workoutSecs=0;
    if(workoutClock)clearInterval(workoutClock);
    workoutClock=setInterval(()=>{workoutSecs++;const el=g('wkt-timer');if(el)el.textContent=fmt(workoutSecs);},1000);
  }
  s.innerHTML='';
  const pad=mk('div',{style:'padding:20px 20px 0'});
  const bk=mk('div',{class:'back'},['← '+p.name]);
  bk.onclick=()=>{if(confirm('Exit workout?')){if(workoutClock)clearInterval(workoutClock);workoutClock=null;activeWorkout=null;progView='detail';renderProg();}};
  pad.appendChild(bk);
  pad.insertAdjacentHTML('beforeend',`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-family:Syne,sans-serif;font-size:18px;font-weight:700">${dayLabel}</div><div style="font-family:Syne,sans-serif;font-size:16px;color:#7c6fff" id="wkt-timer">${fmt(workoutSecs)}</div></div>`);

  // Progress bar
  const total=activeWorkout.sets.reduce((t,ss)=>t+ss.length,0);
  const done=activeWorkout.sets.reduce((t,ss)=>t+ss.filter(s=>s.done).length,0);
  const pct=total?Math.round((done/total)*100):0;
  pad.insertAdjacentHTML('beforeend',`<div style="font-size:12px;color:#888;margin-bottom:6px">${done}/${total} sets · ${pct}%</div><div style="background:#1a1a2a;border-radius:8px;height:6px;margin-bottom:16px"><div style="background:#7c6fff;height:6px;border-radius:8px;width:${pct}%;transition:width .3s"></div></div>`);

  // Rest timer bar
  const rtBar=mk('div',{id:'rt-bar',style:'background:#1a1a2a;border:0.5px solid #2a2a3a;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px'});
  rtBar.innerHTML='<span style="font-size:18px">⏱</span><div style="flex:1"><div id="rt-lbl" style="font-size:13px;font-weight:500">Rest timer</div><div style="font-size:11px;color:#666">Mark a set done to start rest</div></div><div id="rt-disp" style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:#7c6fff">—</div>';
  pad.appendChild(rtBar);

  // Exercises
  exes.forEach((ex,ei)=>{
    const numSets=typeof ex.sets==='number'?ex.sets:3;
    const card=mk('div',{class:'card'});
    card.insertAdjacentHTML('beforeend',`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-weight:500;font-size:15px">${ex.name}</div>${ex.note?'<div style="font-size:11px;color:#666;background:#2a2a3a;padding:3px 8px;border-radius:10px">'+ex.note+'</div>':''}</div>`);
    card.insertAdjacentHTML('beforeend','<div style="font-size:11px;color:#555;margin-bottom:8px">Weight · tap set to mark done</div>');
    const row=mk('div',{style:'display:flex;gap:8px;overflow-x:auto;padding-bottom:4px'});
    for(let si=0;si<numSets;si++){
      const setData=activeWorkout.sets[ei][si];
      const isDone=setData.done;
      const sw=mk('div',{style:'flex-shrink:0;width:68px;text-align:center'});
      const wi=mk('input',{type:'text',placeholder:'kg',style:`width:100%;text-align:center;padding:6px 4px;font-size:13px;background:${isDone?'#7c6fff22':'#0f0f1a'};border:0.5px solid ${isDone?'#7c6fff55':'#2a2a3a'};border-radius:8px;margin-bottom:0`});
      wi.value=setData.weight;wi.oninput=()=>setData.weight=wi.value;
      const sb5=mk('button',{style:`width:100%;background:${isDone?'#7c6fff':'#1a1a2a'};border:0.5px solid ${isDone?'#7c6fff':'#2a2a3a'};border-radius:8px;padding:6px 4px;color:${isDone?'#fff':'#888'};font-size:11px;cursor:pointer;margin-top:4px;font-weight:${isDone?'600':'400'}`});
      sb5.textContent=isDone?'✓ '+(si+1):ex.reps;
      sb5.onclick=()=>{
        setData.done=!setData.done;
        if(setData.done&&ex.rest)startRestTimer(parseInt(ex.rest)||60,ex.name);
        renderActiveWorkout(s);
      };
      sw.append(wi,sb5);row.appendChild(sw);
    }
    card.appendChild(row);pad.appendChild(card);
  });

  // Finish button
  const fb=mk('button',{class:'btn btn-p',style:'margin-top:8px;margin-bottom:20px'},['✓ Finish workout']);
  fb.onclick=async()=>{
    if(!confirm('Finish this workout?'))return;
    if(workoutClock)clearInterval(workoutClock);workoutClock=null;
    fb.textContent='Saving...';fb.disabled=true;
    const t=TYPES.find(x=>x.id===p.type)||{pts:2};
    const dur=Math.max(1,Math.round(workoutSecs/60));
    await sb.from('workouts').insert({user_id:CU.id,username:CU.username,type:p.type||'strength',duration:dur,intensity:2,program_name:p.name+(day?' - '+day.day:''),logged_at:new Date().toISOString()});
    activeWorkout=null;workoutSecs=0;
    toast('💪 Workout saved! +'+t.pts*2+' pts');
    progView='detail';renderProg();
  };
  pad.appendChild(fb);s.appendChild(pad);
}

let rtInterval=null;
function startRestTimer(secs,name){
  if(rtInterval)clearInterval(rtInterval);
  let r=secs;
  const tick=()=>{
    const d=g('rt-disp'),l=g('rt-lbl');
    if(d){d.textContent=r+'s';d.style.color=r<=5?'#ff6b6b':'#7c6fff';}
    if(l)l.textContent='Rest after '+name;
    if(r<=0){clearInterval(rtInterval);if(d)d.textContent='Go!';if(l)l.textContent='Rest complete ✓';}
    r--;
  };tick();rtInterval=setInterval(tick,1000);
}

// ── PROGRAM BUILDER ───────────────────────────────────────────────────────────
function startBuilder(existing){
  if(existing){
    bProg=JSON.parse(JSON.stringify(existing));
    bDayIdx=0;bIcon=existing.icon||'💪';bColor=existing.color||'#7c6fff';bType=existing.type||'strength';bEditId=existing.id;
    bExes=((existing.days&&existing.days[0]&&existing.days[0].exercises)||existing.exercises||[]).map(e=>({...e,_id:uid()}));
    if(!bProg.days)bProg.days=[{day:'Day 1',exercises:[]}];
  } else {
    bProg={name:'',days:[{day:'Day 1',exercises:[]}]};
    bDayIdx=0;bIcon='💪';bColor='#7c6fff';bType='strength';bEditId=null;
    bExes=[];
  }
  progView='builder';renderProg();
}

function renderBuilder(s){
  s.innerHTML='';
  const pad=mk('div',{style:'padding:20px 20px 0'});
  const bk=mk('div',{class:'back',onclick:()=>{progView='list';renderProg();}},['← Cancel']);
  pad.appendChild(bk);
  pad.insertAdjacentHTML('beforeend',`<div style="font-family:Syne,sans-serif;font-size:22px;font-weight:700;margin-bottom:20px">${bEditId?'Edit':'New'} program</div>`);

  // Name
  pad.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:6px">Program name</div>');
  const ni=mkInput('text','e.g. My Push Day',{style:'margin-bottom:16px'});
  ni.value=bProg.name||'';ni.oninput=()=>bProg.name=ni.value;pad.appendChild(ni);

  // Icon
  pad.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:8px">Icon</div>');
  const ir=mk('div',{style:'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap'});
  ['💪','🏋️','🏃','⚡','🧘','⚽','🚴','🥊','🤸','🏊'].forEach(ic=>{
    const b=mk('button',{style:`font-size:22px;background:${bIcon===ic?'#7c6fff22':'#1a1a2a'};border:0.5px solid ${bIcon===ic?'#7c6fff':'#2a2a3a'};border-radius:10px;padding:8px;cursor:pointer;width:46px;height:46px`});
    b.textContent=ic;b.onclick=()=>{bIcon=ic;renderBuilder(s);};ir.appendChild(b);
  });pad.appendChild(ir);

  // Color
  pad.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:8px">Color</div>');
  const cr=mk('div',{style:'display:flex;gap:8px;margin-bottom:16px'});
  ['#7c6fff','#ff6b9d','#4ecdc4','#ffa94d','#51cf66','#ff6b6b'].forEach(c=>{
    const b=mk('div',{style:`width:30px;height:30px;border-radius:50%;background:${c};cursor:pointer;border:${bColor===c?'2px solid #fff':'2px solid transparent'}`});
    b.onclick=()=>{bColor=c;renderBuilder(s);};cr.appendChild(b);
  });pad.appendChild(cr);

  // Type
  pad.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888;margin-bottom:8px">Type</div>');
  const tg=mk('div',{style:'display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px'});
  TYPES.forEach(t=>{
    const b=mk('button',{style:`background:${bType===t.id?t.color+'33':'#1a1a2a'};border:0.5px solid ${bType===t.id?t.color:'#2a2a3a'};border-radius:10px;padding:10px 4px;color:${bType===t.id?t.color:'#888'};font-size:12px;cursor:pointer;`});
    b.innerHTML=t.icon+' '+t.label;b.onclick=()=>{bType=t.id;renderBuilder(s);};tg.appendChild(b);
  });pad.appendChild(tg);

  // Day tabs
  const dayRow=mk('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'});
  dayRow.insertAdjacentHTML('beforeend','<div style="font-size:13px;color:#888">Days</div>');
  const adb=mk('button',{style:'background:transparent;border:0.5px solid #7c6fff44;border-radius:20px;padding:4px 12px;color:#7c6fff;font-size:12px;cursor:pointer;'},['+ Add day']);
  adb.onclick=()=>{bProg.days.push({day:'Day '+(bProg.days.length+1),exercises:[]});bDayIdx=bProg.days.length-1;bExes=[];renderBuilder(s);};
  dayRow.appendChild(adb);pad.appendChild(dayRow);
  const dt=mk('div',{style:'display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px'});
  bProg.days.forEach((d,i)=>{
    const b=mk('button',{style:`background:${bDayIdx===i?'#7c6fff':'#1a1a2a'};border:0.5px solid ${bDayIdx===i?'#7c6fff':'#2a2a3a'};border-radius:20px;padding:6px 14px;color:${bDayIdx===i?'#fff':'#888'};font-size:13px;cursor:pointer;white-space:nowrap;`});
    b.textContent=d.day;
    b.onclick=()=>{syncDay();bDayIdx=i;bExes=[...((bProg.days[i].exercises||[]).map(e=>({...e,_id:e._id||uid()})))];renderBuilder(s);};
    dt.appendChild(b);
  });pad.appendChild(dt);

  // Day name
  const dni=mkInput('text','Day name e.g. Push A',{style:'margin-bottom:12px'});
  dni.value=bProg.days[bDayIdx]&&bProg.days[bDayIdx].day||'';
  dni.oninput=()=>{if(bProg.days[bDayIdx])bProg.days[bDayIdx].day=dni.value;};
  pad.appendChild(dni);

  // Exercises
  const exHdr=mk('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'});
  exHdr.insertAdjacentHTML('beforeend','<div style="font-size:14px;font-weight:500">Exercises</div>');
  const aeb=mk('button',{class:'btn btn-p btn-sm',onclick:addBuilderEx},['+ Add']);
  exHdr.appendChild(aeb);pad.appendChild(exHdr);

  const exCont=mk('div',{id:'b-exes'});
  bExes.forEach(ex=>{
    const card=mk('div',{class:'card',draggable:true,style:'margin-bottom:8px;cursor:grab'});
    card.dataset.id=ex._id;
    const topRow=mk('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:10px'});
    const handle=mk('span',{style:'color:#555;font-size:16px;flex-shrink:0;cursor:grab'},['⠿']);
    const nameIn=mkInput('text','Exercise name',{style:'flex:1;margin-bottom:0;padding:8px 12px;font-size:14px;border-radius:8px;'});
    nameIn.value=ex.name;nameIn.oninput=()=>ex.name=nameIn.value;
    const del=mk('button',{style:'background:#ff444422;border:0.5px solid #ff444444;border-radius:8px;padding:6px 10px;color:#ff7070;cursor:pointer;font-size:14px;flex-shrink:0'});
    del.textContent='✕';del.onclick=()=>{bExes=bExes.filter(e=>e._id!==ex._id);renderBuilder(s);};
    topRow.append(handle,nameIn,del);card.appendChild(topRow);
    const sr=mk('div',{style:'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px'});
    [['Sets','sets',ex.sets,'number'],['Reps','reps',ex.reps,'text'],['Rest(s)','rest',ex.rest,'number']].forEach(([lbl,key,val,type])=>{
      const w=mk('div');
      w.insertAdjacentHTML('beforeend',`<div style="font-size:11px;color:#888;margin-bottom:4px">${lbl}</div>`);
      const inp=mkInput(type,lbl,{style:'padding:8px;font-size:13px;text-align:center;border-radius:8px;margin-bottom:0'});
      inp.value=val||'';inp.oninput=()=>ex[key]=key==='sets'?(parseInt(inp.value)||1):inp.value;
      w.appendChild(inp);sr.appendChild(w);
    });card.appendChild(sr);
    const noi=mkInput('text','Note (optional)',{style:'font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:0'});
    noi.value=ex.note||'';noi.oninput=()=>ex.note=noi.value;card.appendChild(noi);
    card.addEventListener('dragstart',()=>dragSrc=card);
    card.addEventListener('dragover',e=>{e.preventDefault();});
    card.addEventListener('drop',e=>{e.preventDefault();if(dragSrc!==card){const p2=card.parentNode;const kids=[...p2.children];const si=kids.indexOf(dragSrc),di=kids.indexOf(card);if(si<di)p2.insertBefore(dragSrc,card.nextSibling);else p2.insertBefore(dragSrc,card);}});
    exCont.appendChild(card);
  });
  pad.appendChild(exCont);

  if(bProg.days.length>1){
    const ddb=mk('button',{style:'width:100%;background:transparent;border:0.5px solid #ff444433;border-radius:12px;padding:10px;color:#ff7070;font-size:13px;cursor:pointer;margin-bottom:12px;margin-top:8px'});
    ddb.textContent='Delete this day';
    ddb.onclick=()=>{bProg.days.splice(bDayIdx,1);bDayIdx=Math.max(0,bDayIdx-1);bExes=[...((bProg.days[bDayIdx]&&bProg.days[bDayIdx].exercises)||[]).map(e=>({...e,_id:uid()}))];renderBuilder(s);};
    pad.appendChild(ddb);
  }

  const er=mk('div',{class:'err'});
  const sv=mk('button',{class:'btn btn-p',style:'margin-bottom:20px'},['Save program']);
  sv.onclick=saveBuilder;
  pad.append(er,sv);
  s.appendChild(pad);
}

function addBuilderEx(){
  bExes.push({name:'',sets:3,reps:'10',rest:60,note:'',_id:uid()});
  const s=g('s-prog');renderBuilder(s);
}

function syncDay(){
  const els=document.querySelectorAll('#b-exes .card');
  const ordered=[];els.forEach(el=>{const ex=bExes.find(e=>e._id===el.dataset.id);if(ex)ordered.push(ex);});
  bExes=ordered;
  if(bProg.days[bDayIdx])bProg.days[bDayIdx].exercises=bExes.map(({_id,...e})=>e);
}

async function saveBuilder(){
  syncDay();
  if(!bProg.name||!bProg.name.trim()){alert('Give your program a name!');return;}
  const days=bProg.days.map(d=>({...d,exercises:(d.exercises||[]).map(({_id,...e})=>e)}));
  const payload={username:CU.username,user_id:CU.id,name:bProg.name.trim(),icon:bIcon,color:bColor,type:bType,description:days.length+' day'+(days.length>1?'s':''),days};
  if(bEditId){
    await sb.from('programs').update(payload).eq('id',bEditId);
  } else {
    await sb.from('programs').insert(payload);
  }
  toast('Program saved! 💪');
  progView='list';renderProg();
}

// ── ME / PROFILE ──────────────────────────────────────────────────────────────
async function renderMe(){
  const s=g('s-me');
  s.innerHTML='<div style="padding:20px"><div class="spinner" style="margin:60px auto"></div></div>';
  const [{data:myW},{data:bodyLogs}]=await Promise.all([
    sb.from('workouts').select('*').eq('username',CU.username).order('logged_at',{ascending:false}),
    sb.from('body_log').select('*').eq('username',CU.username).order('logged_at',{ascending:false}).limit(10),
  ]);
  s.innerHTML='';
  const pad=mk('div',{style:'padding:20px'});

  // Header
  pad.insertAdjacentHTML('beforeend',`<div style="display:flex;align-items:center;gap:16px;margin-bottom:24px"><div style="width:64px;height:64px;border-radius:50%;background:${CU.color}22;color:${CU.color};display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-size:22px;font-weight:700">${ini(CU.username)}</div><div><div style="font-family:Syne,sans-serif;font-size:22px;font-weight:700">${CU.username}</div><div style="font-size:13px;color:#666">Member since ${new Date(CU.created_at).toLocaleDateString(undefined,{month:'long',year:'numeric'})}</div></div></div>`);

  // Stats
  pad.insertAdjacentHTML('beforeend',`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px"><div class="card" style="padding:14px;text-align:center;margin-bottom:0"><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800">${(myW||[]).length}</div><div style="font-size:10px;color:#666;margin-top:3px">Workouts</div></div><div class="card" style="padding:14px;text-align:center;margin-bottom:0"><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800">${streak(myW)}</div><div style="font-size:10px;color:#666;margin-top:3px">Streak</div></div><div class="card" style="padding:14px;text-align:center;margin-bottom:0"><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800">${pts(myW)}</div><div style="font-size:10px;color:#666;margin-top:3px">Points</div></div></div>`);

  // Body weight log
  pad.insertAdjacentHTML('beforeend','<div class="sh">Body weight log</div>');
  const bwCard=mk('div',{class:'card'});
  const bwRow=mk('div',{style:'display:flex;gap:8px;margin-bottom:12px'});
  const bwIn=mkInput('number','Weight (kg)',{style:'flex:1;margin-bottom:0;padding:10px;font-size:14px;'});
  bwIn.step='0.1';
  const bwBtn=mk('button',{class:'btn btn-p btn-sm'},['Log']);
  bwBtn.onclick=async()=>{
    const v=parseFloat(bwIn.value);if(!v||v<20||v>300){alert('Enter a valid weight');return;}
    await sb.from('body_log').insert({user_id:CU.id,username:CU.username,weight_kg:v,logged_at:new Date().toISOString()});
    toast('Weight logged!');bwIn.value='';renderMe();
  };
  bwRow.append(bwIn,bwBtn);bwCard.appendChild(bwRow);
  if(bodyLogs&&bodyLogs.length){
    const latest=bodyLogs[0];
    const oldest=bodyLogs[bodyLogs.length-1];
    const diff=bodyLogs.length>1?+(latest.weight_kg-oldest.weight_kg).toFixed(1):null;
    bwCard.insertAdjacentHTML('beforeend',`<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px"><div style="font-family:Syne,sans-serif;font-size:24px;font-weight:800">${latest.weight_kg} kg</div>${diff!==null?`<div style="font-size:13px;color:${diff<=0?'#51cf66':'#ff6b6b'}">${diff>0?'+':''}${diff} kg</div>`:''}</div>`);
    bodyLogs.slice(0,5).forEach(l=>{
      bwCard.insertAdjacentHTML('beforeend',`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:0.5px solid #1e1e2e"><span>${new Date(l.logged_at).toLocaleDateString()}</span><span style="font-weight:500">${l.weight_kg} kg</span></div>`);
    });
  } else {
    bwCard.insertAdjacentHTML('beforeend','<div style="color:#555;font-size:13px">No weight logged yet</div>');
  }
  pad.appendChild(bwCard);

  // Workout breakdown
  pad.insertAdjacentHTML('beforeend','<div class="sh" style="margin-top:4px">Breakdown</div>');
  TYPES.forEach(t=>{
    const cnt=(myW||[]).filter(w=>w.type===t.id).length;if(!cnt)return;
    const pct=Math.round((cnt/(myW||[]).length)*100);
    pad.insertAdjacentHTML('beforeend',`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>${t.icon} ${t.label}</span><span style="color:#666">${cnt} sessions</span></div><div style="background:#1a1a2a;border-radius:6px;height:6px"><div style="background:${t.color};height:6px;border-radius:6px;width:${pct}%"></div></div></div>`);
  });

  // Recent history
  pad.insertAdjacentHTML('beforeend','<div class="sh" style="margin-top:8px">History</div>');
  (myW||[]).slice(0,8).forEach(w=>{
    const t=TYPES.find(x=>x.id===w.type)||TYPES[0];
    pad.insertAdjacentHTML('beforeend',`<div class="card" style="display:flex;align-items:center;gap:10px;padding:12px 14px"><span style="font-size:18px">${t.icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:500">${w.program_name||t.label}</div><div style="font-size:11px;color:#666">${w.duration} min · ${new Date(w.logged_at).toLocaleDateString()}</div></div><div style="font-family:Syne,sans-serif;font-size:13px;font-weight:700;color:#a88fff">+${t.pts*(w.intensity||2)}</div></div>`);
  });

  // Logout
  const lb=mk('button',{class:'btn btn-g',style:'margin-top:24px;color:#ff7070;border-color:#ff707033',onclick:logout},['Sign out']);
  pad.appendChild(lb);s.appendChild(pad);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(async()=>{
  const savedId=localStorage.getItem('gf-uid');
  if(savedId){
    const {data}=await sb.from('users').select('*').eq('id',savedId).single();
    if(data){CU=data;launch();return;}
  }
  renderAuth('login');
})();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
